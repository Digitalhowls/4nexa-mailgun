<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4nexa Mailgun — Mantenimiento</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #6366f1;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .badge {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 9999px;
      padding: 0.375rem 1rem;
      font-size: 0.8rem;
      color: #64748b;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      margin-right: 0.4rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">4nexa</div>
    <h1>En mantenimiento</h1>
    <p>
      Estamos actualizando la plataforma de correo electrónico.<br>
      Estaremos de vuelta en unos minutos.
    </p>
    <span class="badge">
      <span class="dot"></span>
      Actualización en curso
    </span>
  </div>
</body>
</html>
