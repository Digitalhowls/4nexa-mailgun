# ──────────────────────────────────────────────────────────────────────────────
# nginx.conf — 4nexa Mailgun Platform
# Routing por subdominio:
#   api.mail.4nexa.io     → control-plane-api:3000
#   admin.mail.4nexa.io   → admin-panel:3000
#   app.mail.4nexa.io     → customer-panel:3000
#
# Nota: En producción aaPanel gestiona los certificados SSL y actúa como
#       proxy externo. Este nginx gestiona el routing interno entre contenedores.
# ──────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Tamaño máximo de body (para uploads de configuraciones)
    client_max_body_size 10m;

    # ── Healthcheck interno (para Docker healthcheck del contenedor nginx) ──
    server {
        listen 80 default_server;
        server_name _;

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 444;
        }
    }

    # ── API: api.mail.4nexa.io → control-plane-api:3000 ───────────────────
    server {
        listen 80;
        server_name api.mail.4nexa.io;

        # Modo mantenimiento (activar: touch /nginx-gateway/maintenance.lock)
        set $maintenance 0;
        if (-f /nginx-gateway/maintenance.lock) {
            set $maintenance 1;
        }

        location / {
            if ($maintenance) {
                return 503;
            }

            proxy_pass         http://control-plane-api:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts para endpoints de larga duración (webhooks, SSE)
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        error_page 503 /maintenance.html;
        location = /maintenance.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ── Admin Panel: admin.mail.4nexa.io → admin-panel:3000 ───────────────
    server {
        listen 80;
        server_name admin.mail.4nexa.io;

        set $maintenance 0;
        if (-f /nginx-gateway/maintenance.lock) {
            set $maintenance 1;
        }

        location / {
            if ($maintenance) {
                return 503;
            }

            proxy_pass         http://admin-panel:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        error_page 503 /maintenance.html;
        location = /maintenance.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ── Customer Panel: app.mail.4nexa.io → customer-panel:3000 ──────────
    server {
        listen 80;
        server_name app.mail.4nexa.io;

        set $maintenance 0;
        if (-f /nginx-gateway/maintenance.lock) {
            set $maintenance 1;
        }

        location / {
            if ($maintenance) {
                return 503;
            }

            proxy_pass         http://customer-panel:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        error_page 503 /maintenance.html;
        location = /maintenance.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
