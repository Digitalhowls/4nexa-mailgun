# ─── classifier-bayes.conf — Clasificador Bayesiano ─────────────────────
# 4nexa Mailgun — Mail Node

classifier "bayes" {
  # Usar Redis como backend para el modelo Bayes
  backend = "redis";
  # Aprendizaje automático cuando el spam es evidente
  autolearn = true;
  # Umbral para aprendizaje automático (>12 → spam, <-3 → ham)
  autolearn_threshold = 12.0;
  # Mínimo de tokens para tomar decisión
  min_tokens = 11;
}
