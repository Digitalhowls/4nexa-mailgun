# ─── dkim_signing.conf — Firma DKIM base ─────────────────────────────────
# 4nexa Mailgun — Mail Node
# Configuración estática base. El Node Agent genera dkim_signing_auto.conf
# en /etc/rspamd/dkim/local.d/ con los dominios y selectores reales.

dkim_signing {
  # Firmar solo mensajes autenticados (submission)
  sign_authenticated = true;
  # No firmar mensajes entrantes
  sign_inbound = false;
  # Usar el dominio del header From:
  use_domain = "header";
  # Algoritmo de firma
  sign_alg = "rsa-sha256";
  # Longitud mínima de clave (bits)
  key_size_bits = 2048;
}
