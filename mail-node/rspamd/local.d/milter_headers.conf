# ─── milter_headers.conf — Cabeceras SMTP ────────────────────────────────
# 4nexa Mailgun — Mail Node

milter_headers {
  # Añadir cabecera X-Spam-Status con puntuación
  use = ["x-spam-status", "x-spam-score", "authentication-results"];
  # Información de autenticación DMARC/DKIM/SPF
  authenticated_headers = ["authentication-results"];
  # Umbral para añadir cabecera X-Spam-Flag: YES
  extended_spam_headers = true;
}
