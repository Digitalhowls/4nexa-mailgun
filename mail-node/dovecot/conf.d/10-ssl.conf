# ─── 10-ssl.conf — SSL/TLS para Dovecot ──────────────────────────────────
# 4nexa Mailgun — Mail Node

ssl = yes
ssl_cert = </etc/ssl/mailnode/cert.pem
ssl_key  = </etc/ssl/mailnode/key.pem

# Protocolos y cifrados seguros
ssl_min_protocol = TLSv1.2
ssl_cipher_list = ECDHE+AESGCM:DHE+AESGCM:ECDHE+AES256:DHE+AES256
ssl_prefer_server_ciphers = yes

# En desarrollo local sin certificados reales: ssl = required → may
# En producción siempre usar ssl = required
