# ─── 10-mail.conf — Almacenamiento de correo ─────────────────────────────
# 4nexa Mailgun — Mail Node
# Maildir bajo /var/mail/<domain>/<localpart>/Maildir

mail_location = maildir:/var/mail/%d/%n/Maildir

# Usuario y grupo para los procesos que acceden al correo
mail_uid = 1000
mail_gid = 1000

# Directorio home del usuario de correo
mail_home = /var/mail/%d/%n

# Permisos de los archivos creados
mail_access_groups = vmail

# Espacio mínimo libre en disco antes de rechazar entregas (50 MB)
mail_full_filesystem_access = no

# Namespace: inbox por defecto
namespace inbox {
  inbox = yes
  location =
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox "Sent Messages" {
    special_use = \Sent
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
}
