# ─── 90-quota.conf — Plugin de cuotas Dovecot ────────────────────────────
# 4nexa Mailgun — Mail Node
# Cuotas individuales por buzón definidas en users.conf via userdb_quota_rule

plugin {
  # Backend: conteo en Maildir (sin base de datos externa)
  quota = maildir:User quota

  # Regla de cuota: el campo userdb_quota_rule del passwd-file la sobreescribe
  # Formato en users.conf: userdb_quota_rule=*:bytes=<N>
  quota_rule = *:storage=1G

  # Advertencia al 80% de la cuota (configurable)
  quota_warning = storage=80%% quota-warning 80 %u
  quota_warning2 = storage=95%% quota-warning 95 %u
}

service quota-warning {
  executable = script /usr/lib/dovecot/quota-warning.sh
  user = vmail
  unix_listener quota-warning {
    mode = 0660
    group = vmail
  }
}
