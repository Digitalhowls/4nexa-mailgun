# ─── 10-auth.conf — Autenticación Dovecot ────────────────────────────────
# 4nexa Mailgun — Mail Node
# Autenticación via passwd-file (generado por node-agent con hashes Argon2id)

disable_plaintext_auth = yes
auth_mechanisms = plain login

# Listener para autenticación SASL que usa Postfix via TCP
service auth {
  inet_listener {
    port = 8994
    address = *
  }
  # Sockets de comunicación interna
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }
  # Usuario con el que corre el proceso auth
  user = root
}

service auth-worker {
  user = root
}

# PassDB: archivo passwd-file (users.conf) con hashes Argon2id
passdb {
  driver = passwd-file
  args = scheme=ARGON2ID username_format=%u /etc/dovecot/users.conf
}

# UserDB: misma fuente, campos uid/gid/home/quota del archivo
userdb {
  driver = passwd-file
  args = username_format=%u /etc/dovecot/users.conf
  default_fields = uid=1000 gid=1000 home=/var/mail/%d/%n
}
