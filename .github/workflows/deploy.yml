# ──────────────────────────────────────────────────────────────────────────────
# Deploy — 4nexa Mailgun Platform
# Trigger: CI pipeline completado en main con éxito
# Pipeline: Deploy vía aaPanel API → Smoke Tests → Rollback automático si falla
# Target: aaPanel (servidor sin SSH público — mismo mecanismo que ERP4nexa)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del deploy manual'
        required: false
        default: 'deploy manual'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Nunca cancelar un deploy en progreso

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PANEL_URL: 'https://admin.digitalhowls.com'
  INSTALL_DIR: '/opt/4nexa-mailgun'
  OUTPUT_PATH: '/www/server/cron/ci_mailgun_deploy_output.txt'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Deploy a Producción vía aaPanel API
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: https://mail.4nexa.io
    steps:
      - name: Deploy via aaPanel API
        env:
          AAPANEL_KEY:       ${{ secrets.AAPANEL_KEY }}
          AAPANEL_CRON_ID:   ${{ secrets.AAPANEL_MAILGUN_CRON_ID }}
          AAPANEL_CRON_HASH: ${{ secrets.AAPANEL_MAILGUN_CRON_HASH }}
          GHCR_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:         ${{ github.actor }}
        run: |
          pip install httpx --quiet
          python3 - << 'PYEOF'
          import hashlib, time, os, sys, base64, json
          import httpx

          PANEL_URL    = os.environ["PANEL_URL"]
          API_KEY      = os.environ["AAPANEL_KEY"]
          CRON_ID      = os.environ["AAPANEL_CRON_ID"]
          CRON_HASH    = os.environ["AAPANEL_CRON_HASH"]
          SCRIPT_PATH  = f"/www/server/cron/{CRON_HASH}"
          DOCKER_CFG   = "/root/.docker/config.json"
          OUTPUT_PATH  = os.environ["OUTPUT_PATH"]
          INSTALL_DIR  = os.environ["INSTALL_DIR"]
          GHCR_TOKEN   = os.environ["GHCR_TOKEN"]
          GHCR_USER    = os.environ["GHCR_USER"]

          def _auth():
              t = int(time.time())
              km = hashlib.md5(API_KEY.encode()).hexdigest()
              tk = hashlib.md5(f"{t}{km}".encode()).hexdigest()
              return {"request_time": t, "request_token": tk}

          def api(endpoint, data=None):
              url = f"{PANEL_URL}{endpoint}"
              payload = {**(data or {}), **_auth()}
              resp = httpx.Client(verify=False, timeout=60).post(url, data=payload)
              try:
                  return resp.json()
              except:
                  return {"status": True, "msg": resp.text[:200]}

          # Actualizar credenciales GHCR en el servidor
          token_b64 = base64.b64encode(f"{GHCR_USER}:{GHCR_TOKEN}".encode()).decode()
          docker_cfg = json.dumps({"auths": {"ghcr.io": {"auth": token_b64}}})
          r_dc_orig = api("/files?action=GetFileBody", {"path": DOCKER_CFG, "encoding": "utf-8"})
          dc_orig = r_dc_orig.get("data", "") or ""
          api("/files?action=SaveFileBody", {"path": DOCKER_CFG, "data": docker_cfg, "encoding": "utf-8"})
          print("Credenciales GHCR actualizadas en el servidor")

          # Guardar cron script original
          r_orig = api("/files?action=GetFileBody", {"path": SCRIPT_PATH, "encoding": "utf-8"})
          orig_script = r_orig.get("data", "") or ""

          # Script de deploy: down → pull → up postgres/redis → migrations → up app → healthcheck
          DEPLOY_SCRIPT = (
              "#!/bin/bash\n"
              "# Lockfile: evitar ejecuciones concurrentes del cron (el cron puede dispararse cada minuto)\n"
              "LOCK_FILE=/tmp/mailgun_deploy.lock\n"
              "if [ -f \"$LOCK_FILE\" ]; then\n"
              "  exit 0\n"
              "fi\n"
              "echo $$ > \"$LOCK_FILE\"\n"
              "trap 'rm -f $LOCK_FILE' EXIT INT TERM\n"
              "set -e\n"
              "PATH=/bin:/sbin:/usr/bin:/usr/sbin:/usr/local/bin:/usr/local/sbin:~/bin\n"
              "export PATH\n"
              f"echo '=== CI Deploy Mailgun' $(date -u) '===' > {OUTPUT_PATH}\n"
              f"cd {INSTALL_DIR}\n"
              f"# Actualizar docker-compose.prod.yml desde git (los port bindings cambian entre versiones)\n"
              f"git pull origin main 2>&1 | tail -3 >> {OUTPUT_PATH} || echo 'git pull failed, usando archivos en cache' >> {OUTPUT_PATH}\n"
              f"# Derribar stack completo: limpia redes/iptables y libera puertos\n"
              f"docker compose -f docker-compose.prod.yml down --remove-orphans 2>&1 | tail -5 >> {OUTPUT_PATH} || true\n"
              f"# Forzar rm de contenedores que puedan quedar\n"
              f"docker rm -f mailgun_api mailgun_admin mailgun_customer 2>/dev/null || true\n"
              f"# Desactivar userland-proxy: usa iptables en vez de docker-proxy (elimina conflictos de puertos)\n"
              f"mkdir -p /etc/docker\n"
              f"echo '{{\"userland-proxy\": false}}' > /etc/docker/daemon.json\n"
              f"# Matar cualquier docker-proxy huerfano ANTES del restart (transicion desde config anterior)\n"
              f"pkill -9 -f docker-proxy 2>/dev/null || true\n"
              f"# Reiniciar Docker daemon para cargar nueva config (userland-proxy: false)\n"
              f"echo 'Restarting Docker daemon...' >> {OUTPUT_PATH}\n"
              f"systemctl restart docker 2>/dev/null || service docker restart 2>/dev/null || true\n"
              f"# Esperar a que Docker esté listo\n"
              f"for k in $(seq 1 15); do\n"
              f"  docker info >/dev/null 2>&1 && echo 'Docker ready' >> {OUTPUT_PATH} && break || true\n"
              f"  sleep 2\n"
              f"done\n"
              f"sleep 2\n"
              f"echo 'Stack down OK' >> {OUTPUT_PATH}\n"
              f"docker compose -f docker-compose.prod.yml pull control-plane-api admin-panel customer-panel 2>&1 | tail -10 >> {OUTPUT_PATH} || true\n"
              f"echo 'Pull OK' >> {OUTPUT_PATH}\n"
              f"# Levantar postgres y redis primero\n"
              f"docker compose -f docker-compose.prod.yml up -d postgres redis 2>&1 | tail -5 >> {OUTPUT_PATH} || {{ echo 'ERROR: Failed to start postgres/redis' >> {OUTPUT_PATH}; exit 1; }}\n"
              f"echo 'DB/Redis started' >> {OUTPUT_PATH}\n"
              f"# Esperar a que postgres esté listo (max 60s)\n"
              f"for j in $(seq 1 30); do\n"
              f"  docker exec mailgun_db pg_isready -U mailgun -q 2>/dev/null && echo 'Postgres ready' >> {OUTPUT_PATH} && break || true\n"
              f"  sleep 2\n"
              f"done\n"
              f"# Ejecutar migraciones (prisma)\n"
              f"docker compose -f docker-compose.prod.yml run --rm --no-deps control-plane-api sh -c 'node_modules/.bin/prisma migrate deploy' >> {OUTPUT_PATH} 2>&1 || echo 'Migrations skipped' >> {OUTPUT_PATH}\n"
              f"# Levantar servicios de aplicación\n"
              f"echo 'Ports before up:' >> {OUTPUT_PATH}\n"
              f"ss -tlnp 2>/dev/null | grep -E '3001|3002|3003' >> {OUTPUT_PATH} || echo 'All target ports free' >> {OUTPUT_PATH}\n"
              f"docker compose -f docker-compose.prod.yml up -d --no-deps control-plane-api >> {OUTPUT_PATH} 2>&1 || {{ echo 'ERROR: Failed to start control-plane-api' >> {OUTPUT_PATH}; exit 1; }}\n"
              f"docker compose -f docker-compose.prod.yml up -d --no-deps admin-panel customer-panel >> {OUTPUT_PATH} 2>&1 || {{ echo 'ERROR: Failed to start admin/customer panels' >> {OUTPUT_PATH}; exit 1; }}\n"
              f"for i in $(seq 1 18); do\n"
              f"  STATUS=$(docker inspect mailgun_api --format '{{{{.State.Health.Status}}}}' 2>/dev/null || echo unknown)\n"
              f"  echo \"Health check $i/18: $STATUS\" >> {OUTPUT_PATH}\n"
              f"  if [ \"$STATUS\" = \"healthy\" ]; then break; fi\n"
              f"  sleep 10\n"
              f"done\n"
              f"FINAL=$(docker inspect mailgun_api --format '{{{{.State.Health.Status}}}}' 2>/dev/null || echo unknown)\n"
              f"echo \"Final status: $FINAL\" >> {OUTPUT_PATH}\n"
              f"if [ \"$FINAL\" != \"healthy\" ]; then echo 'ERROR: mailgun_api not healthy' >> {OUTPUT_PATH}; exit 1; fi\n"
              f"docker image prune -f --filter 'until=72h' >> {OUTPUT_PATH} 2>&1 || true\n"
              f"echo 'Deploy OK' >> {OUTPUT_PATH}\n"
          )

          api("/files?action=SaveFileBody", {"path": SCRIPT_PATH, "data": DEPLOY_SCRIPT, "encoding": "utf-8"})
          r_run = api("/crontab?action=StartTask", {"id": CRON_ID})
          print(f"Deploy lanzado: {r_run.get('msg')}")

          # Esperar resultado (máx 30 min — pull de imágenes puede tomar ~14 min)
          output = ""
          for i in range(180):
              time.sleep(10)
              r_out = api("/files?action=GetFileBody", {"path": OUTPUT_PATH, "encoding": "utf-8"})
              output = r_out.get("data", "") or ""
              # Solo procesar si el archivo ya contiene el header del deploy actual
              if "=== CI Deploy Mailgun" not in output:
                  if i % 6 == 0:
                      sys.stdout.write(f"  [{(i+1)*10}s] esperando inicio del cron...\n")
                      sys.stdout.flush()
                  continue
              if "Deploy OK" in output or "ERROR:" in output:
                  break
              if i % 6 == 0:
                  last = output.split("\n")[-2] if output else "esperando..."
                  sys.stdout.write(f"  [{(i+1)*10}s] {last}\n")
                  sys.stdout.flush()

          lines = output.split("\n")
          print(f"\n=== Deploy Output (últimas 30 líneas) ===\n" + "\n".join(lines[-30:]))

          # Restaurar cron script y docker config originales
          api("/files?action=SaveFileBody", {"path": SCRIPT_PATH, "data": orig_script, "encoding": "utf-8"})
          if dc_orig:
              api("/files?action=SaveFileBody", {"path": DOCKER_CFG, "data": dc_orig, "encoding": "utf-8"})

          if "Deploy OK" not in output:
              print("ERROR: El deploy no completó con éxito")
              sys.exit(1)

          print("¡Deploy completado con éxito!")
          PYEOF

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Smoke Tests en Producción
  # ─────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests — Producción
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Smoke test — API health
        run: |
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://api.mailgun.4nexa.io/api/v1/health" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "✓ API healthy (intento $i)"
              exit 0
            fi
            echo "Intento $i: HTTP $status — esperando 10s…"
            sleep 10
          done
          echo "✗ API no respondió en 2 minutos"
          exit 1

      - name: Smoke test — Auth rechaza credenciales inválidas (401)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.mailgun.4nexa.io/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@invalid.test","password":"invalid"}')
          if [ "$status" = "401" ]; then
            echo "✓ Auth endpoint responde correctamente (401)"
          else
            echo "✗ Auth endpoint devolvió HTTP $status (esperado 401)"
            exit 1
          fi

      - name: Smoke test — Admin panel accesible
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://admin.mailgun.4nexa.io" 2>/dev/null || echo "000")
          if [ "$status" = "200" ] || [ "$status" = "307" ] || [ "$status" = "302" ]; then
            echo "✓ Admin panel accesible (HTTP $status)"
          else
            echo "✗ Admin panel devolvió HTTP $status"
            exit 1
          fi

      - name: Smoke test — Customer panel accesible
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://app.mailgun.4nexa.io" 2>/dev/null || echo "000")
          if [ "$status" = "200" ] || [ "$status" = "307" ] || [ "$status" = "302" ]; then
            echo "✓ Customer panel accesible (HTTP $status)"
          else
            echo "✗ Customer panel devolvió HTTP $status"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Rollback automático si falla el smoke test
  # ─────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback — Producción
    runs-on: ubuntu-latest
    needs: smoke
    if: failure()
    steps:
      - name: Rollback via aaPanel API
        env:
          AAPANEL_KEY:       ${{ secrets.AAPANEL_KEY }}
          AAPANEL_CRON_ID:   ${{ secrets.AAPANEL_MAILGUN_CRON_ID }}
          AAPANEL_CRON_HASH: ${{ secrets.AAPANEL_MAILGUN_CRON_HASH }}
        run: |
          pip install httpx --quiet
          python3 - << 'PYEOF'
          import hashlib, time, os, sys
          import httpx

          PANEL_URL    = os.environ["PANEL_URL"]
          API_KEY      = os.environ["AAPANEL_KEY"]
          CRON_ID      = os.environ["AAPANEL_CRON_ID"]
          CRON_HASH    = os.environ["AAPANEL_CRON_HASH"]
          SCRIPT_PATH  = f"/www/server/cron/{CRON_HASH}"
          OUTPUT_PATH  = os.environ["OUTPUT_PATH"]
          INSTALL_DIR  = os.environ["INSTALL_DIR"]

          def _auth():
              t = int(time.time())
              km = hashlib.md5(API_KEY.encode()).hexdigest()
              tk = hashlib.md5(f"{t}{km}".encode()).hexdigest()
              return {"request_time": t, "request_token": tk}

          def api(endpoint, data=None):
              url = f"{PANEL_URL}{endpoint}"
              payload = {**(data or {}), **_auth()}
              resp = httpx.Client(verify=False, timeout=60).post(url, data=payload)
              try:
                  return resp.json()
              except:
                  return {"status": True, "msg": resp.text[:200]}

          # Leer SHA anterior guardado en el servidor
          sha_file = f"{INSTALL_DIR}/.last_deploy_sha"
          r_sha = api("/files?action=GetFileBody", {"path": sha_file, "encoding": "utf-8"})
          prev_sha = (r_sha.get("data", "") or "").strip()
          if not prev_sha:
              print("⚠️  No hay SHA anterior guardado. Rollback manual necesario.")
              sys.exit(1)

          print(f"🔄 Haciendo rollback a: {prev_sha}")

          ROLLBACK_SCRIPT = (
              "#!/bin/bash\n"
              "set -e\n"
              "PATH=/bin:/sbin:/usr/bin:/usr/sbin:/usr/local/bin:/usr/local/sbin:~/bin\n"
              "export PATH\n"
              f"echo '=== CI Rollback Mailgun' $(date -u) '===' > {OUTPUT_PATH}\n"
              f"cd {INSTALL_DIR}\n"
              f"PREV_SHA=\"{prev_sha}\"\n"
              f"REPO=\"digitalhowls/4nexa-mailgun\"\n"
              f"for SVC in control-plane-api admin-panel customer-panel; do\n"
              f"  docker pull ghcr.io/$REPO/$SVC:$PREV_SHA >> {OUTPUT_PATH} 2>&1 || true\n"
              f"done\n"
              f"docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate control-plane-api admin-panel customer-panel >> {OUTPUT_PATH} 2>&1\n"
              f"echo 'Rollback OK' >> {OUTPUT_PATH}\n"
          )

          r_orig = api("/files?action=GetFileBody", {"path": SCRIPT_PATH, "encoding": "utf-8"})
          orig_script = r_orig.get("data", "") or ""
          api("/files?action=SaveFileBody", {"path": SCRIPT_PATH, "data": ROLLBACK_SCRIPT, "encoding": "utf-8"})
          api("/crontab?action=StartTask", {"id": CRON_ID})

          output = ""
          for i in range(30):
              time.sleep(10)
              r_out = api("/files?action=GetFileBody", {"path": OUTPUT_PATH, "encoding": "utf-8"})
              output = r_out.get("data", "") or ""
              if "Rollback OK" in output or "ERROR:" in output:
                  break

          lines = output.split("\n")
          print(f"\n=== Rollback Output ===\n" + "\n".join(lines[-15:]))
          api("/files?action=SaveFileBody", {"path": SCRIPT_PATH, "data": orig_script, "encoding": "utf-8"})

          if "Rollback OK" not in output:
              print("⚠️  Rollback puede no haber completado. Revisar el servidor manualmente.")
              sys.exit(1)
          print("✅ Rollback completado")
          PYEOF

      - name: Notificar fallo del deploy
        if: always()
        run: echo "::error::El deploy a producción falló. Rollback ejecutado automáticamente."
