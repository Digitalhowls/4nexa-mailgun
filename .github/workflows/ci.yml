# ──────────────────────────────────────────────────────────────────────────────
# CI — 4nexa Mailgun Platform
# Ejecuta en: Pull Requests a main + push a main
# Pipeline: Lint → Typecheck → Tests → Security Scan → Build
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '9'

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required by lint)
        run: pnpm turbo run build --filter=@4nexa/types --filter=@4nexa/validators

      - name: Lint
        run: pnpm turbo run lint

  # ── 2. Typecheck ──────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter=@4nexa/types --filter=@4nexa/validators

      - name: Typecheck
        run: pnpm turbo run typecheck

  # ── 3. Unit tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter=@4nexa/types --filter=@4nexa/validators

      - name: Run tests
        run: pnpm turbo run test -- --ci --coverage --passWithNoTests
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-32chars-minimum00
          JWT_REFRESH_SECRET: ci-refresh-secret-32chars-minimum0
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: services/control-plane-api/coverage/
          retention-days: 7

  # ── 4. Security scan ──────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: false

  # ── 5. Build Docker images ────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      api_tag: ${{ steps.meta-api.outputs.tags }}
      admin_tag: ${{ steps.meta-admin.outputs.tags }}
      customer_tag: ${{ steps.meta-customer.outputs.tags }}
      sha_short: ${{ steps.sha.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/control-plane-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata — Admin Panel
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/admin-panel
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata — Customer Panel
        id: meta-customer
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/customer-panel
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata — Node Agent
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/node-agent
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push — control-plane-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/control-plane-api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.sha_short }}

      - name: Build & push — admin-panel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-panel/Dockerfile
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.sha_short }}

      - name: Build & push — customer-panel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/customer-panel/Dockerfile
          push: true
          tags: ${{ steps.meta-customer.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.sha_short }}

      - name: Build & push — node-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/node-agent/Dockerfile
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.sha_short }}
