# ──────────────────────────────────────────────────────────────────────────────
# CI — 4nexa Mailgun Platform
# Ejecuta en: Pull Requests a main + push a main
# Pipeline: Lint → Typecheck → Tests → Security Scan → Build
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Evita deprecation warnings de acciones con Node 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '20'

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required by lint)
        run: pnpm turbo run build --filter=@4nexa/types --filter=@4nexa/validators

      - name: Lint
        run: pnpm turbo run lint

  # ── 2. Typecheck ──────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter=@4nexa/types --filter=@4nexa/validators

      - name: Typecheck
        run: pnpm turbo run typecheck

  # ── 3. Unit tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter=@4nexa/types --filter=@4nexa/validators

      - name: Run tests
        run: pnpm turbo run test -- --ci --coverage --passWithNoTests
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-32chars-minimum00
          JWT_REFRESH_SECRET: ci-refresh-secret-32chars-minimum0
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: services/control-plane-api/coverage/
          retention-days: 7

  # ── 4. Security scan ──────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: false

  # ── 5. Build & Push Docker Images ───────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha_short: ${{ steps.sha.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Auto-bump de versión (igual que ERP): feat → minor, resto → patch
      - name: Auto-bump patch version
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          LAST_MSG=$(git log -1 --format=%s)
          if echo "$LAST_MSG" | grep -qE "^feat(\(|:)"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > VERSION
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "📦 Version bump: $CURRENT → $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main || true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Calcular tags comunes ──────────────────────────────────────────────
      - name: Compute image tags
        id: tags
        run: |
          VER="${{ steps.bump.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha_short }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          for SVC in control-plane-api admin-panel customer-panel node-agent; do
            GHCR_BASE="ghcr.io/${REPO}/${SVC}"
            TAGS="${GHCR_BASE}:latest,${GHCR_BASE}:${VER},${GHCR_BASE}:${SHA}"
            echo "tags_${SVC//-/_}=${TAGS}" >> "$GITHUB_OUTPUT"
          done
          echo "📋 Images tagged: $VER / $SHA"

      - name: Docker metadata — Node Agent
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/node-agent
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push — control-plane-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/control-plane-api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags_control_plane_api }}
          platforms: linux/amd64
          cache-from: type=gha,scope=api-${{ hashFiles('services/control-plane-api/**', 'packages/**', 'pnpm-lock.yaml') }}
          cache-to: type=gha,mode=max,scope=api-${{ hashFiles('services/control-plane-api/**', 'packages/**', 'pnpm-lock.yaml') }}
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.sha_short }}
            APP_VERSION=${{ steps.bump.outputs.version }}

      - name: Build & push — admin-panel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-panel/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags_admin_panel }}
          platforms: linux/amd64
          cache-from: type=gha,scope=admin-${{ hashFiles('apps/admin-panel/**', 'packages/**', 'pnpm-lock.yaml') }}
          cache-to: type=gha,mode=max,scope=admin-${{ hashFiles('apps/admin-panel/**', 'packages/**', 'pnpm-lock.yaml') }}
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.sha_short }}
            APP_VERSION=${{ steps.bump.outputs.version }}

      - name: Build & push — customer-panel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/customer-panel/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags_customer_panel }}
          platforms: linux/amd64
          cache-from: type=gha,scope=customer-${{ hashFiles('apps/customer-panel/**', 'packages/**', 'pnpm-lock.yaml') }}
          cache-to: type=gha,mode=max,scope=customer-${{ hashFiles('apps/customer-panel/**', 'packages/**', 'pnpm-lock.yaml') }}
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.sha_short }}
            APP_VERSION=${{ steps.bump.outputs.version }}

      - name: Build & push — node-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/node-agent/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags_node_agent }}
          platforms: linux/amd64
          cache-from: type=gha,scope=agent-${{ hashFiles('services/node-agent/**', 'packages/**', 'pnpm-lock.yaml') }}
          cache-to: type=gha,mode=max,scope=agent-${{ hashFiles('services/node-agent/**', 'packages/**', 'pnpm-lock.yaml') }}
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.sha_short }}
            APP_VERSION=${{ steps.bump.outputs.version }}

      - name: Verificar push
        run: |
          echo "✅ Imágenes subidas — versión ${{ steps.bump.outputs.version }}"
          echo "  control-plane-api: ${{ steps.tags.outputs.tags_control_plane_api }}"
          echo "  admin-panel:       ${{ steps.tags.outputs.tags_admin_panel }}"
          echo "  customer-panel:    ${{ steps.tags.outputs.tags_customer_panel }}"
          echo "  node-agent:        ${{ steps.tags.outputs.tags_node_agent }}"
