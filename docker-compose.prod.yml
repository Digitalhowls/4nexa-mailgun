# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Producción
# Uso: docker compose -f docker-compose.prod.yml up -d
# Variables de entorno: cargadas desde /opt/4nexa/.env
# ──────────────────────────────────────────────────────────────────────────────

networks:
  4nexa-internal:
    driver: bridge
  4nexa-edge:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: 4nexa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-4nexa}
      POSTGRES_USER: ${POSTGRES_USER:-4nexa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - 4nexa-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-4nexa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: 4nexa-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --requirepass ${REDIS_PASSWORD} --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - 4nexa-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Control Plane API ──────────────────────────────────────────────────────
  control-plane-api:
    image: ghcr.io/digitalhowls/4nexa-mailgun/control-plane-api:latest
    container_name: 4nexa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-4nexa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-4nexa}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - 4nexa-internal
      - 4nexa-edge
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Admin Panel ────────────────────────────────────────────────────────────
  admin-panel:
    image: ghcr.io/digitalhowls/4nexa-mailgun/admin-panel:latest
    container_name: 4nexa-admin
    restart: unless-stopped
    depends_on:
      control-plane-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
    networks:
      - 4nexa-internal
      - 4nexa-edge
    ports:
      - "127.0.0.1:3001:3000"

  # ── Customer Panel ─────────────────────────────────────────────────────────
  customer-panel:
    image: ghcr.io/digitalhowls/4nexa-mailgun/customer-panel:latest
    container_name: 4nexa-customer
    restart: unless-stopped
    depends_on:
      control-plane-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
    networks:
      - 4nexa-internal
      - 4nexa-edge
    ports:
      - "127.0.0.1:3002:3001"
