# ──────────────────────────────────────────────────────────────────────────────
# Grafana — metrics.TU_DOMINIO (acceso restringido por IP recomendado)
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name metrics.CHANGE_ME_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/metrics.CHANGE_ME_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metrics.CHANGE_ME_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/metrics.CHANGE_ME_DOMAIN/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    # Restricción de acceso por IP — añade tu IP de gestión
    # allow 1.2.3.4;
    # deny all;

    access_log /var/log/nginx/grafana.access.log combined;
    error_log  /var/log/nginx/grafana.error.log  warn;

    location / {
        proxy_pass http://grafana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
