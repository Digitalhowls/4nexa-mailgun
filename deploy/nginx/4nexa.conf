# ──────────────────────────────────────────────────────────────────────────────
# Nginx — configuración principal para 4nexa Mailgun Platform
#
# Instalación en aaPanel:
#   1. Copia este archivo en /etc/nginx/conf.d/4nexa.conf
#   2. Ajusta los dominios (api.TU_DOMINIO, erp.TU_DOMINIO, mail.TU_DOMINIO)
#   3. Obtén certificados TLS con: certbot --nginx -d api.TU_DOMINIO ...
#   4. nginx -t && systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=panel_limit:10m   rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstream: Control Plane API ────────────────────────────────────────────────
upstream control_plane_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Upstream: Admin Panel ──────────────────────────────────────────────────────
upstream admin_panel {
    server 127.0.0.1:3001;
    keepalive 16;
}

# ── Upstream: Customer Panel ───────────────────────────────────────────────────
upstream customer_panel {
    server 127.0.0.1:3002;
    keepalive 16;
}

# ── Upstream: Grafana ──────────────────────────────────────────────────────────
upstream grafana {
    server 127.0.0.1:3003;
    keepalive 8;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.CHANGE_ME_DOMAIN erp.CHANGE_ME_DOMAIN mail.CHANGE_ME_DOMAIN metrics.CHANGE_ME_DOMAIN;
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────────────────────────────────────
# Control Plane API — api.TU_DOMINIO
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api.CHANGE_ME_DOMAIN;

    # TLS (certbot popula estos paths)
    ssl_certificate     /etc/letsencrypt/live/api.CHANGE_ME_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.CHANGE_ME_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.CHANGE_ME_DOMAIN/chain.pem;

    # Configuración TLS segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Seguridad HTTP
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Tamaño máximo de cuerpo para payloads API
    client_max_body_size 10m;

    # Logs
    access_log /var/log/nginx/api.access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/api.error.log  warn;

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://control_plane_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Rate limiting estricto para endpoints de autenticación
    location ~ ^/auth/(login|register|refresh) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://control_plane_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check público (sin rate limit)
    location = /health {
        proxy_pass http://control_plane_api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# Admin Panel — erp.TU_DOMINIO
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name erp.CHANGE_ME_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/erp.CHANGE_ME_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.CHANGE_ME_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/erp.CHANGE_ME_DOMAIN/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.CHANGE_ME_DOMAIN;" always;

    client_max_body_size 5m;

    access_log /var/log/nginx/admin.access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/admin.error.log  warn;

    # Assets estáticos de Next.js con caché agresiva
    location /_next/static/ {
        proxy_pass http://admin_panel;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        limit_req  zone=panel_limit burst=30 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://admin_panel;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

